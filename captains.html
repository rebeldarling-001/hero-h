    padding:0;

}

body{

}

.back-btn{

    font-family:'Orbitron', sans-serif;

    font-size:28px;
}

.captains-list{
    display:flex;
    flex-direction:column;
    gap:12px;
}

.captain-item{
    display:flex;
    align-items:center;
    gap:15px;
    padding:12px;
    border-radius:15px;

}

.captain-item img{
    width:60px;
    height:60px;

}

.team-name{

}

.captain-name{
