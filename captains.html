<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}


body{

background:#030303;

color:white;

font-family:Arial,sans-serif;

padding:20px;

}



.back-btn{

color:#ff7b00;

text-decoration:none;

font-weight:bold;

font-family:'Poppins';

}



.captains-heading{

text-align:center;

font-family:'Orbitron';

font-size:28px;

color:#ff7b00;

margin:25px;

text-shadow:0 0 20px #ff7b00;

}



.captains-list{

display:flex;

flex-direction:column;

gap:14px;

}



.captain-item{


height:90px;


display:flex;

align-items:center;


gap:20px;


padding:12px 20px;


position:relative;


overflow:hidden;


border-radius:18px;


background:#080808;


border:2px solid var(--team);


box-shadow:

0 0 18px var(--team);



}



/* background diagonal lines */

.captain-item::before{


content:"";


position:absolute;


inset:0;


background:

repeating-linear-gradient(

120deg,

transparent 0px,

transparent 35px,

rgba(255,255,255,.08) 36px,

transparent 42px

);



}





/* bright moving streak */


.captain-item::after{


content:"";


position:absolute;


width:450px;


height:120px;


left:35%;


top:-20px;


background:

linear-gradient(

90deg,

transparent,

var(--team),

transparent

);



transform:rotate(-25deg);


opacity:.35;



}


/* arrows right */


.captain-item span{


position:absolute;


right:30px;


font-size:50px;


color:var(--team);

opacity:.7;


}




.captain-item img{


width:65px;

height:65px;


border-radius:50%;


border:3px solid white;


z-index:3;


box-shadow:

0 0 20px var(--team);



}



.captain-item div{

z-index:3;

}




.team-name{


font-size:22px;


font-family:'Orbitron';


font-weight:900;


color:white;


text-shadow:

0 0 10px var(--team);



}



.captain-name{

font-size:14px;

color:white;

}





.srh{

--team:#ff7a00;

}


.rcb{

--team:#ff0000;

}


.csk{

--team:#ffd600;

}


.mi{

--team:#0066ff;

}


.kkr{

--team:#a020f0;

}


.rr{

--team:#ff1493;

}


.dc{

--team:#008cff;

}


.pbks{

--team:#ff0000;

}


.lsg{

--team:#00ff55;

}


.gt{

--team:#00ffff;

}

.captain-item{

    transition:0.3s ease;

}


/* click glow effect */

.captain-item:active{

    transform:scale(0.98);

    box-shadow:

    0 0 35px var(--team),
    0 0 70px var(--team);

}


/* image glow on click */

.captain-item:active img{

    box-shadow:

    0 0 30px var(--team);

}


/* text glow on click */

.captain-item:active .team-name{

    text-shadow:

    0 0 20px var(--team);

}

</style>
</head>
